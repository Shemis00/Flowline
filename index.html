<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Flowline — your work, in motion</title>
    <meta
      name="description"
      content="Flowline is a collaborative kanban board for planning work across dashboard, board, list, and assignee views — with live sync, due dates, and team members."
    />
    <meta name="application-name" content="Flowline" />
    <meta name="author" content="Flowline" />
    <meta name="keywords" content="Flowline, kanban, board, tasks, project management, collaboration, dashboard" />
    <meta name="robots" content="index, follow" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#eef1f6" media="(prefers-color-scheme: light)" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Flowline" />
    <meta property="og:title" content="Flowline — your work, in motion" />
    <meta
      property="og:description"
      content="Plan and move work across kanban, list, and assignee views. Live sync, due dates, and teammates — all in one board."
    />
    <meta property="og:image" content="/apple-touch-icon.png" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Flowline — your work, in motion" />
    <meta
      name="twitter:description"
      content="Plan and move work across kanban, list, and assignee views. Live sync, due dates, and teammates — all in one board."
    />
    <meta name="twitter:image" content="/apple-touch-icon.png" />

    <script>
      document.documentElement.setAttribute(
        "data-theme",
        localStorage.getItem("kanban-theme") === "light" ? "light" : "dark",
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
